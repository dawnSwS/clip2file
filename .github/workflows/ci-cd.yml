name: Build Installer on Push

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Application Icon
        shell: bash
        run: |
          curl -L "https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f4cb.png" -o "app_icon.png"
          magick app_icon.png -define icon:auto-resize=64,48,32,16 app_icon.ico

      - name: Generate Version
        id: versioning
        shell: bash
        run: |
          VERSION_LINE=$(grep '^version\s*=' Cargo.toml | head -n 1)
          BASE_VERSION=$(echo "$VERSION_LINE" | sed -E 's/version\s*=\s*"([0-9]+\.[0-9]+).*/\1/')
          [ -z "$BASE_VERSION" ] && BASE_VERSION="1.0"
          
          echo "BUILD_VERSION=${BASE_VERSION}.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Update Cargo.toml
        shell: bash
        run: sed -i "s/^version = \".*\"/version = \"$BUILD_VERSION\"/" Cargo.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Binary
        run: cargo build --release

      - name: Compile Installer
        shell: cmd
        run: |
          mkdir Output
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=%BUILD_VERSION%" "/OOutput" "/FClip2File_Setup_v%BUILD_VERSION%" setup.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: Clip2File_Setup_v${{ env.BUILD_VERSION }}
          path: Output/*.exe
          retention-days: 7